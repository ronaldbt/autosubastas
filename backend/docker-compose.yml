name: subastas

services:
  postgres:
    image: postgres:15-alpine
    container_name: subastas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: subastas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - subastas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  subastas_postgres_data:

