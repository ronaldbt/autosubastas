<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="32" height="32"></canvas>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
ctx.fillStyle='#f97316';
ctx.fillRect(0,0,32,32);
ctx.strokeStyle='white';
ctx.lineWidth=2.5;
ctx.lineCap='round';
ctx.lineJoin='round';
ctx.save();
ctx.translate(4,4);
ctx.beginPath();ctx.arc(7,17,2,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.arc(17,17,2,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.moveTo(5,17);ctx.lineTo(3,17);ctx.lineTo(3,11);ctx.lineTo(5,6);ctx.lineTo(11,6);ctx.lineTo(15,11);ctx.lineTo(19,11);ctx.lineTo(19,17);ctx.lineTo(17,17);ctx.stroke();
ctx.beginPath();ctx.moveTo(7,10);ctx.lineTo(17,10);ctx.stroke();
ctx.restore();
const a=document.createElement('a');
a.download='favicon.png';
a.href=c.toDataURL('image/png');
a.click();
</script>
</body>
</html>
